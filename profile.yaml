roles_target:
  - devops intern
  - sre intern
  - cloud intern
  - platform engineering intern
  - stage devops
  - stage cloud
  - stagiaire devops
hard_filters:
  # Drop anything that is not explicitly an internship/stage. Set false to
  # also see regular jobs.
  require_internship: true
  internship_terms: [intern, internship, stage, stagiaire, trainee, summer 2026]
  exclude_terms: [senior, lead, staff, principal, "5+ years", "10+ years"]
  location_rules:
    - tunisia_ok: true
    - remote_ok: true
    - onsite_abroad: false
  max_age_days: 90
# CV per language. French sources (keejob, emploitunisie, tanitjobs) use the
# fr CV + a French cover letter; everything else uses en. A plain string is
# still accepted and used for every language.
cv_path:
  en: ./Nacef_Moula.pdf
  fr: ./Nacef_Moula_Cv.pdf
