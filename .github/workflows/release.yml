name: Release

# Tag a commit (e.g. `git tag v0.1.0 && git push --tags`) to build the
# package and publish a GitHub Release with the sdist + wheel attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify the package installs and the CLI runs
        run: |
          pip install dist/*.whl
          hunter --help

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          dist/*
          --title "${GITHUB_REF_NAME}"
          --generate-notes
